<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SHIFT</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: system-ui, sans-serif; background: #fafafa; }
    h2 { margin: 0 0 8px 0; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      min-height: 36px;
      flex-wrap: wrap;
    }
    .nav-section a {
      color: #7b68ee;
      text-decoration: none;
      cursor: pointer;
      font-size: 1.1em;
    }
    .nav-section a:hover { text-decoration: underline; }
    .nav-section .component-name {
      font-weight: 600;
      font-size: 1.1em;
    }

    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }
    .zoom-controls button {
      width: 32px;
      height: 32px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    .zoom-controls button:hover { background: #eee; }
    .zoom-controls .zoom-level {
      font-size: 0.85em;
      color: #666;
      min-width: 40px;
      text-align: center;
    }

    #svg-viewport {
      width: 100%;
      height: 85vh;
      border: 1px solid #ddd;
      border-radius: 12px;
      overflow: auto;
      background: #fff;
      position: relative;
      cursor: grab;
    }
    #svg-viewport:active { cursor: grabbing; }

    #svg-container {
      transform-origin: 0 0;
      display: inline-block;
      min-width: 100%;
      min-height: 100%;
    }
    #svg-container svg {
      display: block;
    }
  </style>
</head>
<body>
  <h2>SHIFT</h2>

  <div class="toolbar">
    <div class="nav-section" id="nav-bar"></div>
    <div class="zoom-controls">
      <button id="zoom-out" title="Zoom out">−</button>
      <span class="zoom-level" id="zoom-level">100%</span>
      <button id="zoom-in" title="Zoom in">+</button>
      <button id="zoom-fit" title="Fit to screen" style="font-size:13px; width:auto; padding:0 8px;">Fit</button>
      <button id="zoom-reset" title="Reset zoom" style="font-size:13px; width:auto; padding:0 8px;">1:1</button>
    </div>
  </div>

  <div id="svg-viewport">
    <div id="svg-container"></div>
  </div>

  <script>
    const viewport = document.getElementById('svg-viewport');
    const container = document.getElementById('svg-container');
    const navBar = document.getElementById('nav-bar');
    const zoomLevelDisplay = document.getElementById('zoom-level');
    const navStack = [];
    let currentScale = 1;
    const ZOOM_STEP = 0.15;
    const MIN_ZOOM = 0.2;
    const MAX_ZOOM = 3;

    const componentMap = {
      'asset-management':        { svg: 'svgs/Asset-Management.svg',        name: 'Asset Management' },
      'benefit-cost':            { svg: 'svgs/Benefit-Cost.svg',            name: 'Benefit Cost' },
      'bike-ped':                { svg: 'svgs/Bike-Ped.svg',                name: 'Bicycle / Pedestrian' },
      'congestion-reliability':  { svg: 'svgs/Congestion-Reliability.svg',  name: 'Congestion & Reliability' },
      'crash-history':           { svg: 'svgs/Crash-History.svg',           name: 'Crash History' },
      'economic-growth':         { svg: 'svgs/Economic-Growth.svg',         name: 'Economic Growth' },
      'input-components-bike-ped':                 { svg: 'svgs/Input-Components-Bike-Ped.svg',                 name: 'Input Components (Bike/Ped)' },
      'input-components-congestion':               { svg: 'svgs/Input-Components-Congestion.svg',               name: 'Input Components (Congestion)' },
      'input-components-crash-history':            { svg: 'svgs/Input-Components-Crash-History.svg',            name: 'Input Components (Crash History)' },
      'input-components-roadway-characteristics':  { svg: 'svgs/Input-Components-Roadway-Characteristics.svg',  name: 'Input Components (Roadway Characteristics)' },
      'input-components-project-list': { svg: 'svgs/Input-Components-Project-List.svg', name: 'Input Components (Project List)' },
      'output-crash-history': { svg: 'svgs/Output-Crash-History.svg', name: 'Output (Crash History)' },
      'resilience':              { svg: 'svgs/Resilience.svg',              name: 'Resilience' },
      'roadway-characteristics': { svg: 'svgs/Roadway-Characteristics.svg', name: 'Roadway Characteristics' }
    };

    // --- Zoom ---
    function setZoom(scale) {
      currentScale = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, scale));
      container.style.transform = 'scale(' + currentScale + ')';
      zoomLevelDisplay.textContent = Math.round(currentScale * 100) + '%';
    }

    function zoomToFit() {
      const svg = container.querySelector('svg');
      if (!svg) return;
      const svgW = svg.viewBox.baseVal.width || svg.getBoundingClientRect().width / currentScale;
      const svgH = svg.viewBox.baseVal.height || svg.getBoundingClientRect().height / currentScale;
      const vpW = viewport.clientWidth - 20;
      const vpH = viewport.clientHeight - 20;
      const fitScale = Math.min(vpW / svgW, vpH / svgH, 1);
      setZoom(fitScale);
      viewport.scrollTop = 0;
      viewport.scrollLeft = 0;
    }

    document.getElementById('zoom-in').addEventListener('click', function() { setZoom(currentScale + ZOOM_STEP); });
    document.getElementById('zoom-out').addEventListener('click', function() { setZoom(currentScale - ZOOM_STEP); });
    document.getElementById('zoom-reset').addEventListener('click', function() { setZoom(1); viewport.scrollTop = 0; viewport.scrollLeft = 0; });
    document.getElementById('zoom-fit').addEventListener('click', zoomToFit);

    // Mouse wheel zoom
    viewport.addEventListener('wheel', function(e) {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
        setZoom(currentScale + delta);
      }
    }, { passive: false });

    // --- Navigation ---
    function resolveComponent(href) {
      if (!href) return null;
      const lower = href.toLowerCase();
      let bestKey = null;
      let bestVal = null;
      for (const [key, val] of Object.entries(componentMap)) {
        if (lower.includes(key)) {
          if (!bestKey || key.length > bestKey.length) {
            bestKey = key;
            bestVal = val;
          }
        }
      }
      return bestVal;
    }
    
    function updateNav() {
      if (navStack.length === 0) {
        navBar.innerHTML = '';
      } else {
        const current = navStack[navStack.length - 1];
        navBar.innerHTML = '';
        const backLink = document.createElement('a');
        backLink.textContent = '\u2190 Back';
        backLink.addEventListener('click', function(e) {
          e.preventDefault();
          goBack();
        });
        const nameSpan = document.createElement('span');
        nameSpan.className = 'component-name';
        nameSpan.textContent = ' ' + current.name;
        navBar.appendChild(backLink);
        navBar.appendChild(nameSpan);
      }
    }

    async function loadSVG(svgPath) {
      try {
        const response = await fetch(svgPath);
        if (!response.ok) throw new Error('Failed to load ' + svgPath);
        const svgText = await response.text();

        // Reset zoom before injecting so zoomToFit measures correctly
        setZoom(1);
        container.innerHTML = svgText;

        

        // Remove any fixed width/height on the SVG so it respects the container
        const svg = container.querySelector('svg');
        if (svg) {
          // Ensure viewBox exists for proper scaling
          if (!svg.getAttribute('viewBox')) {
            const w = svg.getAttribute('width') || svg.getBoundingClientRect().width;
            const h = svg.getAttribute('height') || svg.getBoundingClientRect().height;
            svg.setAttribute('viewBox', '0 0 ' + parseFloat(w) + ' ' + parseFloat(h));
          }
          svg.removeAttribute('width');
          svg.removeAttribute('height');
        }

        // Defer to next frame so SVG is rendered and getBBox works
        requestAnimationFrame(function() {
          attachLinkHandlers();
          zoomToFit();
        });
      } catch (err) {
        console.error('Error loading SVG:', err);
        container.innerHTML = '<p style="padding:20px;color:red;">Error loading diagram: ' + err.message + '</p>';
      }
    }

    function attachLinkHandlers() {
      const SVG_NS = 'http://www.w3.org/2000/svg';
      const links = container.querySelectorAll('a');
      links.forEach(function(link) {
        const href = link.getAttribute('href')
                  || link.getAttributeNS('http://www.w3.org/1999/xlink', 'href')
                  || '';
        const comp = resolveComponent(href);
        if (comp) {
          link.removeAttribute('href');
          link.removeAttributeNS('http://www.w3.org/1999/xlink', 'href');

          // Add an invisible overlay rect covering the entire link bounding box.
          // This makes the whole area clickable regardless of how Obsidian exports fills.
          try {
            var bbox = link.getBBox();
            var overlay = document.createElementNS(SVG_NS, 'rect');
            overlay.setAttribute('x', bbox.x);
            overlay.setAttribute('y', bbox.y);
            overlay.setAttribute('width', bbox.width);
            overlay.setAttribute('height', bbox.height);
            overlay.setAttribute('fill', 'transparent');
            overlay.setAttribute('stroke', 'none');
            overlay.style.cursor = 'pointer';
            link.appendChild(overlay);
          } catch(e) {
            // getBBox can fail if element isn't rendered yet; fall back to pointer-events
            link.style.pointerEvents = 'bounding-box';
          }

          link.style.cursor = 'pointer';
          link.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            navigateTo(comp);
          });
        } else if (href.startsWith('file:///')) {
          link.removeAttribute('href');
          link.removeAttributeNS('http://www.w3.org/1999/xlink', 'href');
        }
      });
    }

    function navigateTo(comp) {
      navStack.push(comp);
      loadSVG(comp.svg);
      updateNav();
    }

    function goBack() {
      if (navStack.length > 0) {
        navStack.pop();
        if (navStack.length > 0) {
          const prev = navStack[navStack.length - 1];
          loadSVG(prev.svg);
        } else {
          loadSVG('svgs/Main.svg');
        }
        updateNav();
      }
    }

    // Initial load
    loadSVG('svgs/Main.svg');
  </script>
</body>
</html>
